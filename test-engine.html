<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burner Drop — Crypto Engine Tests</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0e17;
            color: #c8d0e0;
            padding: 24px;
            line-height: 1.6;
        }
        h1 { color: #00f0ff; margin-bottom: 8px; font-size: 1.3rem; }
        h2 { color: #8b5cf6; margin: 24px 0 8px; font-size: 1rem; }
        .subtitle { color: #5a6478; font-size: 0.85rem; margin-bottom: 24px; }
        #log {
            background: #111627;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            padding: 16px;
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 0.82rem;
            max-height: 70vh;
            overflow-y: auto;
        }
        .pass { color: #10e888; }
        .fail { color: #ef4444; }
        .info { color: #00f0ff; }
        .warn { color: #f59e0b; }
        .dim  { color: #5a6478; }
        .bold { font-weight: bold; }
        .separator { color: #2a3040; }
    </style>
</head>
<body>
    <h1>🔐 Burner Drop — Crypto Engine Tests</h1>
    <p class="subtitle">Browser-native AES-256-GCM • No external libraries • Zero trust</p>
    <div id="log"></div>

    <script type="module">
        // ====================================================================
        // Import the crypto engine
        // ====================================================================
        import {
            generateKey,
            encryptFile,
            decryptFile,
            uploadToIPFS,
            fetchFromIPFS,
            encryptAndUpload,
            fetchAndDecrypt,
            setApiKey,
            buildShareLink,
            parseShareLink,
        } from './crypto-engine.js';

        // ====================================================================
        // Test Logger
        // ====================================================================
        const logEl = document.getElementById('log');

        function log(msg, cls = '') {
            const span = document.createElement('span');
            span.className = cls;
            span.textContent = msg + '\n';
            logEl.appendChild(span);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function separator() {
            log('─'.repeat(64), 'separator');
        }

        function pass(label) { log(`  ✅ PASS: ${label}`, 'pass'); }
        function fail(label, err) { log(`  ❌ FAIL: ${label} — ${err}`, 'fail'); }
        function info(msg) { log(`  ℹ  ${msg}`, 'info'); }
        function warn(msg) { log(`  ⚠  ${msg}`, 'warn'); }

        // ====================================================================
        // Helper — create a mock File from string content
        // ====================================================================
        function createMockFile(content, name, type) {
            const blob = new Blob([content], { type });
            return new File([blob], name, { type });
        }

        // Helper — compare two ArrayBuffers byte-for-byte
        function buffersEqual(buf1, buf2) {
            if (buf1.byteLength !== buf2.byteLength) return false;
            const a = new Uint8Array(buf1);
            const b = new Uint8Array(buf2);
            for (let i = 0; i < a.length; i++) {
                if (a[i] !== b[i]) return false;
            }
            return true;
        }

        // ====================================================================
        // Test Suite
        // ====================================================================
        async function runTests() {
            log('🧪 BURNER DROP — CRYPTO ENGINE TEST SUITE', 'bold');
            log(`   ${new Date().toISOString()}`, 'dim');
            separator();

            let passed = 0;
            let failed = 0;

            // ----------------------------------------------------------------
            // TEST 1: Key Generation
            // ----------------------------------------------------------------
            log('\n📌 TEST 1: Key Generation', 'info');
            try {
                const { cryptoKey, exportedKey } = await generateKey();

                // Verify CryptoKey object
                if (!(cryptoKey instanceof CryptoKey)) throw new Error('Not a CryptoKey');
                if (cryptoKey.algorithm.name !== 'AES-GCM') throw new Error('Wrong algorithm');
                if (cryptoKey.algorithm.length !== 256) throw new Error('Wrong key length');

                // Verify Base64 export is 44 chars (32 bytes → Base64)
                if (typeof exportedKey !== 'string') throw new Error('Key not a string');
                if (exportedKey.length < 40) throw new Error('Key too short');

                // Verify key is extractable
                if (!cryptoKey.extractable) throw new Error('Key not extractable');

                // Verify usages include encrypt and decrypt
                const usages = cryptoKey.usages;
                if (!usages.includes('encrypt') || !usages.includes('decrypt')) {
                    throw new Error('Missing encrypt/decrypt usages');
                }

                info(`Key algorithm: ${cryptoKey.algorithm.name}-${cryptoKey.algorithm.length}`);
                info(`Exported key length: ${exportedKey.length} chars`);
                info(`Key (first 12 chars): ${exportedKey.substring(0, 12)}...`);
                pass('Key generation');
                passed++;
            } catch (err) {
                fail('Key generation', err.message);
                failed++;
            }

            separator();

            // ----------------------------------------------------------------
            // TEST 2: Encrypt → Decrypt roundtrip (text file)
            // ----------------------------------------------------------------
            log('\n📌 TEST 2: Encrypt → Decrypt Roundtrip (text)', 'info');
            try {
                const originalContent = 'The Burner Drop: zero-trust file sharing 🔥🔐';
                const originalFile = createMockFile(
                    originalContent,
                    'secret-message.txt',
                    'text/plain'
                );

                // Encrypt
                const encrypted = await encryptFile(originalFile);

                // Verify encrypted result shape
                if (!(encrypted.encryptedData instanceof Blob)) throw new Error('No encrypted blob');
                if (typeof encrypted.iv !== 'string') throw new Error('No IV string');
                if (typeof encrypted.key !== 'string') throw new Error('No key string');
                if (encrypted.fileName !== 'secret-message.txt') throw new Error('Wrong fileName');
                if (encrypted.fileType !== 'text/plain') throw new Error('Wrong fileType');

                // Verify encrypted data differs from plaintext
                if (encrypted.encryptedData.size === originalFile.size) {
                    warn('Encrypted size equals original — might not be encrypted (GCM adds 16-byte tag)');
                }

                info(`Original size: ${originalFile.size} bytes`);
                info(`Encrypted size: ${encrypted.encryptedData.size} bytes (includes 16-byte auth tag)`);
                info(`IV: ${encrypted.iv}`);

                // Decrypt
                const decryptedFile = await decryptFile(
                    encrypted.encryptedData,
                    encrypted.key,
                    encrypted.iv,
                    encrypted.fileType,
                    encrypted.fileName
                );

                // Verify decrypted file
                if (!(decryptedFile instanceof File)) throw new Error('Not a File object');
                if (decryptedFile.name !== 'secret-message.txt') throw new Error('Wrong name');
                if (decryptedFile.type !== 'text/plain') throw new Error('Wrong type');

                const decryptedText = await decryptedFile.text();
                if (decryptedText !== originalContent) {
                    throw new Error(`Content mismatch: "${decryptedText}"`);
                }

                info(`Decrypted content: "${decryptedText}"`);
                pass('Text file roundtrip');
                passed++;
            } catch (err) {
                fail('Text file roundtrip', err.message);
                failed++;
            }

            separator();

            // ----------------------------------------------------------------
            // TEST 3: Encrypt → Decrypt roundtrip (binary data)
            // ----------------------------------------------------------------
            log('\n📌 TEST 3: Encrypt → Decrypt Roundtrip (binary)', 'info');
            try {
                // Create a binary file with random bytes
                const binaryData = crypto.getRandomValues(new Uint8Array(4096));
                const binaryFile = new File([binaryData], 'random.bin', {
                    type: 'application/octet-stream',
                });

                const encrypted = await encryptFile(binaryFile);
                const decrypted = await decryptFile(
                    encrypted.encryptedData,
                    encrypted.key,
                    encrypted.iv,
                    encrypted.fileType,
                    encrypted.fileName
                );

                // Byte-for-byte comparison
                const originalBuf = binaryData.buffer;
                const decryptedBuf = await decrypted.arrayBuffer();

                if (!buffersEqual(originalBuf, decryptedBuf)) {
                    throw new Error('Binary content mismatch after decrypt');
                }

                info(`Binary file: ${binaryData.length} bytes → encrypted → decrypted ✓`);
                pass('Binary file roundtrip');
                passed++;
            } catch (err) {
                fail('Binary file roundtrip', err.message);
                failed++;
            }

            separator();

            // ----------------------------------------------------------------
            // TEST 4: Wrong key → decryption must fail
            // ----------------------------------------------------------------
            log('\n📌 TEST 4: Decryption with Wrong Key (must fail)', 'info');
            try {
                const file = createMockFile('Top secret data', 'secret.txt', 'text/plain');
                const encrypted = await encryptFile(file);

                // Generate a DIFFERENT key
                const { exportedKey: wrongKey } = await generateKey();

                try {
                    await decryptFile(
                        encrypted.encryptedData,
                        wrongKey,  // ← wrong key
                        encrypted.iv,
                        encrypted.fileType,
                        encrypted.fileName
                    );
                    throw new Error('Decryption should have failed but succeeded!');
                } catch (innerErr) {
                    if (innerErr.message.includes('should have failed')) throw innerErr;
                    info(`Correctly rejected: "${innerErr.message}"`);
                    pass('Wrong key rejection (GCM auth tag verification)');
                    passed++;
                }
            } catch (err) {
                fail('Wrong key rejection', err.message);
                failed++;
            }

            separator();

            // ----------------------------------------------------------------
            // TEST 5: File size limit enforcement
            // ----------------------------------------------------------------
            log('\n📌 TEST 5: File Size Limit (>10 MB must fail)', 'info');
            try {
                // Create a file just over 10 MB
                const oversized = new File(
                    [new Uint8Array(10 * 1024 * 1024 + 1)],
                    'huge.bin',
                    { type: 'application/octet-stream' }
                );

                try {
                    await encryptFile(oversized);
                    throw new Error('Should have rejected oversized file');
                } catch (innerErr) {
                    if (innerErr.message.includes('Should have')) throw innerErr;
                    info(`Correctly rejected: "${innerErr.message}"`);
                    pass('File size limit enforced');
                    passed++;
                }
            } catch (err) {
                fail('File size limit', err.message);
                failed++;
            }

            separator();

            // ----------------------------------------------------------------
            // TEST 6: Unique IV per encryption
            // ----------------------------------------------------------------
            log('\n📌 TEST 6: Unique IV per Encryption', 'info');
            try {
                const file = createMockFile('same content', 'test.txt', 'text/plain');

                const enc1 = await encryptFile(file);
                const enc2 = await encryptFile(file);
                const enc3 = await encryptFile(file);

                if (enc1.iv === enc2.iv || enc2.iv === enc3.iv || enc1.iv === enc3.iv) {
                    throw new Error('IVs are not unique!');
                }

                // Keys should also be unique (each encryption generates a fresh key)
                if (enc1.key === enc2.key || enc2.key === enc3.key) {
                    throw new Error('Keys are not unique per encryption!');
                }

                info(`IV 1: ${enc1.iv.substring(0, 16)}...`);
                info(`IV 2: ${enc2.iv.substring(0, 16)}...`);
                info(`IV 3: ${enc3.iv.substring(0, 16)}...`);
                pass('Unique IV per encryption');
                passed++;
            } catch (err) {
                fail('Unique IV', err.message);
                failed++;
            }

            separator();

            // ----------------------------------------------------------------
            // TEST 7: Share link build + parse roundtrip
            // ----------------------------------------------------------------
            log('\n📌 TEST 7: Share Link Build & Parse', 'info');
            try {
                const payload = {
                    cid: 'bafybeigdyrzt5sfp7udm7hu76uh7y26nf3efuylqabf3oclgtqy55fbzdi',
                    key: 'dGVzdGtleWJhc2U2NC4uLg==',
                    iv: 'cmFuZG9taXYxMjM=',
                    fileName: 'report.pdf',
                    fileType: 'application/pdf',
                };

                const link = buildShareLink('https://burnerdrop.io', payload);
                info(`Built link: ${link.substring(0, 60)}...`);

                const parsed = parseShareLink(link);

                if (parsed.cid !== payload.cid) throw new Error('CID mismatch');
                if (parsed.key !== payload.key) throw new Error('Key mismatch');
                if (parsed.iv !== payload.iv) throw new Error('IV mismatch');
                if (parsed.fileName !== payload.fileName) throw new Error('fileName mismatch');
                if (parsed.fileType !== payload.fileType) throw new Error('fileType mismatch');

                pass('Share link roundtrip');
                passed++;
            } catch (err) {
                fail('Share link', err.message);
                failed++;
            }

            separator();

            // ----------------------------------------------------------------
            // TEST 8: Multiple file types
            // ----------------------------------------------------------------
            log('\n📌 TEST 8: Multiple MIME Types', 'info');
            try {
                const files = [
                    createMockFile('<html>Hello</html>', 'page.html', 'text/html'),
                    createMockFile('{"key":"val"}', 'data.json', 'application/json'),
                    createMockFile('col1,col2\na,b', 'data.csv', 'text/csv'),
                ];

                for (const file of files) {
                    const enc = await encryptFile(file);
                    const dec = await decryptFile(
                        enc.encryptedData, enc.key, enc.iv, enc.fileType, enc.fileName
                    );
                    const original = await file.text();
                    const result = await dec.text();
                    if (original !== result) throw new Error(`Mismatch for ${file.name}`);
                    if (dec.type !== file.type) throw new Error(`Type mismatch for ${file.name}`);
                    info(`${file.name} (${file.type}): ✓`);
                }

                pass('Multiple MIME types');
                passed++;
            } catch (err) {
                fail('MIME types', err.message);
                failed++;
            }

            separator();

            // ----------------------------------------------------------------
            // TEST 9: IPFS upload guard (no API key)
            // ----------------------------------------------------------------
            log('\n📌 TEST 9: IPFS Upload Without API Key (must fail)', 'info');
            try {
                const blob = new Blob(['test'], { type: 'application/octet-stream' });
                try {
                    await uploadToIPFS(blob);
                    throw new Error('Should have required API key');
                } catch (innerErr) {
                    if (innerErr.message.includes('Should have')) throw innerErr;
                    info(`Correctly rejected: "${innerErr.message}"`);
                    pass('API key guard');
                    passed++;
                }
            } catch (err) {
                fail('API key guard', err.message);
                failed++;
            }

            separator();

            // ----------------------------------------------------------------
            // TEST 10: Invalid share link parse (must fail)
            // ----------------------------------------------------------------
            log('\n📌 TEST 10: Invalid Share Link (must fail)', 'info');
            try {
                try {
                    parseShareLink('https://example.com#garbage=true');
                    throw new Error('Should have rejected invalid link');
                } catch (innerErr) {
                    if (innerErr.message.includes('Should have')) throw innerErr;
                    info(`Correctly rejected: "${innerErr.message}"`);
                    pass('Invalid share link rejection');
                    passed++;
                }
            } catch (err) {
                fail('Invalid link', err.message);
                failed++;
            }

            separator();

            // ----------------------------------------------------------------
            // Summary
            // ----------------------------------------------------------------
            log('');
            log('━'.repeat(64), 'separator');
            log(`\n📊 RESULTS: ${passed} passed, ${failed} failed, ${passed + failed} total\n`, 
                failed === 0 ? 'pass bold' : 'fail bold');

            if (failed === 0) {
                log('🔒 All crypto operations verified. Engine is ready for integration.', 'pass');
            } else {
                log('⚠️  Some tests failed. Review output above.', 'fail');
            }
        }

        // Run!
        runTests().catch(err => {
            log(`\n💥 FATAL: ${err.message}\n${err.stack}`, 'fail');
        });
    </script>
</body>
</html>
